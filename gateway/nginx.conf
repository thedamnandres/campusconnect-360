events {
    worker_connections 1024;
}

http {
    # ─── Upstream services ──────────────────────────────────────────
    upstream academic   { server academic-service:8001; }
    upstream payment    { server payment-service:8002; }
    upstream notification { server notification-service:8003; }
    upstream attendance { server attendance-service:8004; }
    upstream analytics  { server analytics-service:8005; }

    # ─── Rate limiting ──────────────────────────────────────────────
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;

    server {
        listen 80;

        # Headers de seguridad
        add_header X-Gateway "CampusConnect360" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;

        # ── Rutas por servicio ──────────────────────────────────────

        location /api/academic/ {
            limit_req zone=api_limit burst=20 nodelay;
            proxy_pass http://academic/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /api/payments/ {
            limit_req zone=api_limit burst=20 nodelay;
            proxy_pass http://payment/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /api/notifications/ {
            limit_req zone=api_limit burst=20 nodelay;
            proxy_pass http://notification/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /api/attendance/ {
            limit_req zone=api_limit burst=20 nodelay;
            proxy_pass http://attendance/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /api/analytics/ {
            limit_req zone=api_limit burst=20 nodelay;
            proxy_pass http://analytics/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # ── Health check del gateway ────────────────────────────────
        location /health {
            return 200 '{"status":"ok","gateway":"CampusConnect360"}';
            add_header Content-Type application/json;
        }
    }
}
