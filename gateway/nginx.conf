events {
    worker_connections 1024;
}

http {
    # Docker DNS resolver. Using variables in proxy_pass prevents stale
    # upstream IPs when services are recreated during docker compose builds.
    resolver 127.0.0.11 ipv6=off valid=10s;

    # ─── Rate limiting ──────────────────────────────────────────────
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;

    server {
        listen 80;

        # Headers de seguridad
        add_header X-Gateway "CampusConnect360" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;

        # ── Rutas por servicio ──────────────────────────────────────

        location /api/academic/ {
            limit_req zone=api_limit burst=20 nodelay;
            set $academic_service academic-service:8001;
            rewrite ^/api/academic/(.*)$ /$1 break;
            proxy_pass http://$academic_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /api/payments/ {
            limit_req zone=api_limit burst=20 nodelay;
            set $payment_service payment-service:8002;
            rewrite ^/api/payments/(.*)$ /$1 break;
            proxy_pass http://$payment_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /api/notifications/ {
            limit_req zone=api_limit burst=20 nodelay;
            set $notification_service notification-service:8003;
            rewrite ^/api/notifications/(.*)$ /$1 break;
            proxy_pass http://$notification_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /api/attendance/ {
            limit_req zone=api_limit burst=20 nodelay;
            set $attendance_service attendance-service:8004;
            rewrite ^/api/attendance/(.*)$ /$1 break;
            proxy_pass http://$attendance_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /api/analytics/ {
            limit_req zone=api_limit burst=20 nodelay;
            set $analytics_service analytics-service:8005;
            rewrite ^/api/analytics/(.*)$ /$1 break;
            proxy_pass http://$analytics_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # ── Health check del gateway ────────────────────────────────
        location /health {
            return 200 '{"status":"ok","gateway":"CampusConnect360"}';
            add_header Content-Type application/json;
        }
    }
}
